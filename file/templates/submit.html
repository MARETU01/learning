<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传 - 带进度条</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .upload-area {
            border: 2px dashed #6a11cb;
            border-radius: 10px;
            padding: 40px 20px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            background-color: rgba(106, 17, 203, 0.05);
            border-color: #2575fc;
        }

        .upload-icon {
            font-size: 48px;
            color: #6a11cb;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            margin-bottom: 20px;
        }

        .browse-btn {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3);
        }

        .browse-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(106, 17, 203, 0.4);
        }

        #file-input {
            display: none;
        }

        .file-info {
            text-align: left;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .file-size {
            color: #666;
            font-size: 14px;
        }

        .progress-container {
            margin-bottom: 25px;
            display: none;
        }

        .progress-bar {
            height: 12px;
            background-color: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress {
            height: 100%;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 14px;
        }

        .status-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .upload-btn, .continue-btn {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3);
            width: 100%;
            font-weight: 600;
            display: none;
        }

        .upload-btn:hover, .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(106, 17, 203, 0.4);
        }

        .upload-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .continue-btn {
            background: linear-gradient(to right, #00b09b, #96c93d);
            box-shadow: 0 4px 15px rgba(0, 176, 155, 0.3);
        }

        .continue-btn:hover {
            box-shadow: 0 6px 20px rgba(0, 176, 155, 0.4);
        }

        .button-container {
            display: flex;
            gap: 15px;
        }

        .file-list {
            text-align: left;
            margin-bottom: 20px;
        }

        .file-row {
            margin-bottom: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
        }

        .file-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 12px;
        }

        .file-label {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .remove-btn {
            border: none;
            background: transparent;
            color: #ff4d4f;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .remove-btn:hover:not(:disabled) {
            background-color: rgba(255, 77, 79, 0.1);
        }

        .remove-btn:disabled {
            color: #bbb;
            cursor: not-allowed;
        }

        .empty-hint {
            color: #999;
            font-size: 14px;
            text-align: center;
            padding: 20px 0;
            border: 1px dashed #e0e0e0;
            border-radius: 8px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .button-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>文件上传</h1>
        <p class="subtitle">支持大文件上传，实时显示上传进度</p>

        <div class="upload-area" id="upload-area">
            <div class="upload-icon">📁</div>
            <p class="upload-text">拖放文件到此处或点击浏览</p>
            <button class="browse-btn" id="browse-btn">选择文件</button>
            <input type="file" id="file-input" name="files" multiple>
        </div>

        <div class="file-list" id="file-list"></div>

        <div class="status-message" id="status-message"></div>

        <div class="button-container">
            <button class="upload-btn" id="upload-btn" disabled>开始上传</button>
            <button class="continue-btn" id="continue-btn" style="display: none;">继续上传</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('file-input');
            const uploadArea = document.getElementById('upload-area');
            const browseBtn = document.getElementById('browse-btn');
            const uploadBtn = document.getElementById('upload-btn');
            const continueBtn = document.getElementById('continue-btn');
            const fileList = document.getElementById('file-list');
            const statusMessage = document.getElementById('status-message');

            let filesQueue = [];
            let uploadsInProgress = false;
            const getFileKey = (file) => `${file.name}-${file.size}-${file.lastModified}`;

            const createFileRow = (file, index) => {
                const row = document.createElement('div');
                row.className = 'file-row';
                row.dataset.index = index;
                row.innerHTML = `
                    <div class="file-meta">
                        <div class="file-label">
                            <div class="file-name">${file.name}</div>
                            <div class="file-size">${formatFileSize(file.size)}</div>
                        </div>
                        <button class="remove-btn" data-index="${index}">移除</button>
                    </div>
                    <div class="progress-bar">
                        <div class="progress" id="progress-${index}"></div>
                    </div>
                    <div class="progress-text">
                        <span id="status-${index}">待上传</span>
                        <span id="percent-${index}">0%</span>
                    </div>`;
                return row;
            };

            const refreshFileList = () => {
                fileList.innerHTML = '';
                filesQueue.forEach((file, idx) => fileList.appendChild(createFileRow(file, idx)));
                uploadBtn.disabled = filesQueue.length === 0 || uploadsInProgress;
                uploadBtn.style.display = filesQueue.length ? 'block' : 'none';
                continueBtn.style.display = 'none';

                if (filesQueue.length === 0) {
                    fileList.innerHTML = `<div class="empty-hint">没有文件，拖放文件到此处或点击“选择文件”按钮</div>`;
                }
            };

            const formatFileSize = (bytes) => {
                if (!bytes) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return `${parseFloat((bytes / Math.pow(k, i)).toFixed(2))} ${sizes[i]}`;
            };

            const handleSelection = (fileListObj) => {
                const newFiles = Array.from(fileListObj);
                const existingKeys = new Set(filesQueue.map(getFileKey));
                newFiles.forEach((file) => {
                    const key = getFileKey(file);
                    if (existingKeys.has(key)) return;
                    filesQueue.push(file);
                    existingKeys.add(key);
                });
                refreshFileList();
                statusMessage.style.display = 'none';
            };

            browseBtn.addEventListener('click', () => fileInput.click());
            uploadArea.addEventListener('click', (e) => {
                if (e.target === browseBtn) return;
                fileInput.click();
            });

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                if (e.dataTransfer.files.length) handleSelection(e.dataTransfer.files);
            });

            fileInput.addEventListener('change', () => {
                if (!fileInput.files.length) return;
                handleSelection(fileInput.files);
                fileInput.value = '';
            });

            const setStatus = (index, text, type = '') => {
                const statusEl = document.getElementById(`status-${index}`);
                if (!statusEl) return;
                statusEl.textContent = text;
                statusEl.className = type;
            };

            const setProgress = (index, percent) => {
                const bar = document.getElementById(`progress-${index}`);
                const percentEl = document.getElementById(`percent-${index}`);
                if (bar) bar.style.width = `${percent}%`;
                if (percentEl) percentEl.textContent = `${percent}%`;
            };

            const uploadFiles = () => {
                uploadsInProgress = true;
                uploadBtn.disabled = true;
                uploadBtn.textContent = '上传中...';

                const formData = new FormData();
                filesQueue.forEach((file) => formData.append('files', file));

                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/upload');

                xhr.upload.addEventListener('progress', (e) => {
                    if (!e.lengthComputable) return;
                    const totalPercent = Math.round((e.loaded / e.total) * 100);
                    const perFilePercent = Math.round(totalPercent / filesQueue.length);
                    filesQueue.forEach((_, idx) => setProgress(idx, perFilePercent));
                });

                xhr.onreadystatechange = () => {
                    if (xhr.readyState !== XMLHttpRequest.DONE) return;
                    uploadsInProgress = false;
                    uploadBtn.textContent = '开始上传';

                    if (xhr.status === 200) {
                        const { results } = JSON.parse(xhr.responseText);
                        results.forEach((result, idx) => {
                            setProgress(idx, 100);
                            setStatus(idx, result.message, result.status);
                        });
                        showStatus('所有文件上传完成', 'success');
                        continueBtn.style.display = 'block';
                        uploadBtn.style.display = 'none';
                    } else {
                        showStatus('上传失败，请重试', 'error');
                        uploadBtn.disabled = false;
                    }
                };

                xhr.send(formData);
            };

            const showStatus = (message, type) => {
                statusMessage.textContent = message;
                statusMessage.className = `status-message ${type}`;
                statusMessage.style.display = 'block';
            };

            uploadBtn.addEventListener('click', uploadFiles);
            continueBtn.addEventListener('click', () => {
                filesQueue = [];
                uploadBtn.style.display = 'none';
                continueBtn.style.display = 'none';
                fileInput.value = '';
                statusMessage.style.display = 'none';
                fileList.innerHTML = '';
                refreshFileList();
            });

            fileList.addEventListener('click', (e) => {
                if (!e.target.classList.contains('remove-btn')) return;
                const index = Number(e.target.dataset.index);
                if (Number.isNaN(index)) return;
                filesQueue.splice(index, 1);
                refreshFileList();
            });

            refreshFileList();
        });
    </script>
</body>
</html>
